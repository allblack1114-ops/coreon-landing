<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>COREON 캐시 초기화</title>
  <meta name="robots" content="noindex, nofollow, noarchive">
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans KR", "Malgun Gothic", Arial, sans-serif;
      background: linear-gradient(180deg, #eef5fc, #fff);
      color: #071a33;
      word-break: keep-all;
    }
    .card {
      width: min(560px, calc(100% - 28px));
      padding: 28px;
      border: 1px solid #dce7f3;
      border-radius: 22px;
      background: #fff;
      box-shadow: 0 18px 50px rgba(7, 26, 51, .12);
    }
    h1 { margin: 0; font-size: 28px; letter-spacing: -.04em; }
    p { color: #647083; line-height: 1.7; font-weight: 750; }
    .status { margin-top: 14px; padding: 14px; border-radius: 14px; background: #f4f8fc; font-weight: 900; }
    a {
      display: inline-flex;
      margin-top: 16px;
      min-height: 44px;
      align-items: center;
      justify-content: center;
      padding: 0 16px;
      border-radius: 12px;
      background: #071a33;
      color: #fff;
      font-weight: 950;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>COREON 앱 캐시 초기화</h1>
    <p>예전 관리자 화면이 계속 보이는 문제를 해결하기 위해 브라우저의 PWA 서비스워커와 캐시를 삭제합니다.</p>
    <div class="status" id="status">초기화 중입니다...</div>
    <a id="go" href="/admin.html?fresh=v11" style="display:none;">관리자 화면 열기</a>
  </main>
  <script>
    async function resetCache() {
      const logs = [];
      try {
        if ("serviceWorker" in navigator) {
          const registrations = await navigator.serviceWorker.getRegistrations();
          for (const registration of registrations) {
            await registration.unregister();
          }
          logs.push(`서비스워커 ${registrations.length}건 삭제`);
        }
        if ("caches" in window) {
          const keys = await caches.keys();
          for (const key of keys) await caches.delete(key);
          logs.push(`캐시 ${keys.length}건 삭제`);
        }
        localStorage.setItem("coreon_cache_reset_at", new Date().toISOString());
        document.getElementById("status").textContent = `${logs.join(" · ") || "삭제할 캐시 없음"} · 완료`;
        document.getElementById("go").style.display = "inline-flex";
        setTimeout(() => location.replace("/admin.html?fresh=v11"), 1200);
      } catch (error) {
        document.getElementById("status").textContent = `초기화 실패: ${error.message}`;
        document.getElementById("go").style.display = "inline-flex";
      }
    }
    resetCache();
  </script>
</body>
</html>
